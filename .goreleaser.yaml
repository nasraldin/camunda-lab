version: 2

project_name: camunda-lab

before:
  hooks:
    - go mod tidy
    # UI dist is built in CI before GoReleaser (make ui). Local: make ui.

builds:
  - id: camunda
    main: ./cmd/camunda
    binary: camunda
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - id: default
    builds: [camunda]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format: tar.gz
    files:
      - LICENSE
      - README.md
      - overlays/*

checksum:
  name_template: checksums.txt

changelog:
  sort: asc

release:
  github:
    owner: nasraldin
    name: camunda-lab
