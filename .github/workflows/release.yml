name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v7
        with:
          go-version-file: go.mod

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: internal/ui/web/package-lock.json

      - name: Build UI
        run: make ui

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # GoReleaser publishes the GitHub Release via GITHUB_TOKEN, which does not
  # trigger other workflows (release: published). Publish the Homebrew tap here.
  publish-homebrew:
    name: Publish Homebrew formula
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Check tap token
        id: token
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          if [[ -z "${HOMEBREW_TAP_TOKEN:-}" ]]; then
            echo "skip=true" >> "${GITHUB_OUTPUT}"
            echo "::warning::HOMEBREW_TAP_TOKEN secret is not set. Skipping tap publish."
          else
            echo "skip=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: Publish to nasraldin/homebrew-tools
        if: steps.token.outputs.skip == 'false'
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          TAP_REPO: nasraldin/homebrew-tools
        run: |
          set -euo pipefail
          chmod +x scripts/publish-homebrew.sh
          ./scripts/publish-homebrew.sh "${GITHUB_REF_NAME}"
