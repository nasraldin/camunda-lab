name: Homebrew

# Manual / backfill only. Normal releases publish the tap from release.yml
# (GoReleaser uses GITHUB_TOKEN, which does not trigger release:published).
on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish (e.g. v0.5.0). Defaults to latest release."
        required: false
        type: string

permissions:
  contents: read

jobs:
  publish-tap:
    name: Publish formula to homebrew-tools
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Resolve tag
        id: tag
        env:
          INPUT_TAG: ${{ inputs.tag }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if [[ -n "${INPUT_TAG:-}" ]]; then
            TAG="${INPUT_TAG}"
          else
            TAG="$(gh release view --json tagName -q .tagName)"
          fi
          [[ "${TAG}" == v* ]] || { echo "Tag must start with v (got ${TAG})" >&2; exit 1; }
          echo "tag=${TAG}" >> "${GITHUB_OUTPUT}"
          echo "Publishing Homebrew formula for ${TAG}"

      - name: Require tap token
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          if [[ -z "${HOMEBREW_TAP_TOKEN:-}" ]]; then
            echo "::error::HOMEBREW_TAP_TOKEN secret is not set."
            echo "See docs/homebrew.md for setup."
            exit 1
          fi

      - name: Publish to nasraldin/homebrew-tools
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          TAP_REPO: nasraldin/homebrew-tools
        run: |
          set -euo pipefail
          chmod +x scripts/publish-homebrew.sh
          ./scripts/publish-homebrew.sh "${{ steps.tag.outputs.tag }}"
