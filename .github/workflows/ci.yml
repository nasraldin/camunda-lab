name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: Test & build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Go
        uses: actions/setup-go@v7
        with:
          go-version-file: go.mod

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: internal/ui/web/package-lock.json

      - name: Format
        run: make fmt-check

      - name: Tidy
        run: make tidy

      - name: Vet
        run: go vet ./...

      - name: Govulncheck
        continue-on-error: true
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@v1.1.3
          govulncheck ./...

      - name: Build UI
        run: make ui

      - name: Verify embedded UI dist is committed
        run: git diff --exit-code internal/ui/web/dist

      - name: Test
        run: go test ./...

      - name: Frontend typecheck
        working-directory: internal/ui/web
        run: npm ci && npm run typecheck

      - name: Frontend lint
        working-directory: internal/ui/web
        run: npm run lint

      - name: Playwright mock contracts
        working-directory: internal/ui/web
        run: npx playwright install chromium && npm run test:browser -- --project=mock

      - name: Build
        run: go build -ldflags "-X main.version=ci" -o bin/camunda ./cmd/camunda

      - name: ShellCheck
        uses: ludeeus/action-shellcheck@2.0.0
        env:
          SHELLCHECK_OPTS: -e SC2034
        with:
          scandir: scripts
          additional_files: install.sh
          severity: error
