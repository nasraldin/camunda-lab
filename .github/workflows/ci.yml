name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: Test & build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Go
        uses: actions/setup-go@v7
        with:
          go-version-file: go.mod

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: internal/ui/web/package-lock.json

      - name: Format
        run: make fmt-check

      - name: Tidy
        run: make tidy

      - name: Vet
        run: go vet ./...

      - name: Govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

      - name: Build UI
        run: make ui

      - name: Verify embedded UI dist is committed
        run: git diff --exit-code internal/ui/web/dist

      - name: Test
        run: go test ./...

      - name: Build
        run: go build -ldflags "-X main.version=ci" -o bin/camunda ./cmd/camunda

      - name: ShellCheck
        uses: ludeeus/action-shellcheck@2.0.0
        env:
          SHELLCHECK_OPTS: -e SC2034
        with:
          scandir: scripts
          additional_files: install.sh
          severity: error
